name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            wayland-protocols

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --all

      - name: Run clippy
        run: cargo clippy -- -D warnings
